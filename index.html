<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Открыть в браузере</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #05070a;
            --bg-card: #111622;
            --accent-blue: #007aff;
            --text-white: #ffffff;
            --text-gray: #9ca3af;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background-color: var(--bg-main); color: var(--text-white); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        #tt-shield {
            display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-main); z-index: 99999; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .perfect-arrow {
            position: absolute; top: 15px; right: 25px; width: 85px; height: 85px;
            animation: arrow-bounce 0.8s infinite alternate ease-in-out;
        }
        .perfect-arrow svg { width: 100%; height: 100%; fill: #ffff00; filter: drop-shadow(0 0 15px rgba(255, 255, 0, 0.9)); }
        @keyframes arrow-bounce { from { transform: translate(0, 0); } to { transform: translate(12px, -18px); } }
        .shield-modal { background: var(--bg-card); border: 1px solid var(--accent-blue); border-radius: 32px; padding: 35px 20px; text-align: center; width: 100%; max-width: 350px; }
        .shield-step { background: rgba(255, 255, 255, 0.04); border-radius: 18px; padding: 14px; margin-top: 10px; display: flex; align-items: center; text-align: left; border: 1px solid rgba(255,255,255,0.05); }
        .step-num { background: var(--accent-blue); width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; margin-right: 12px; flex-shrink: 0; font-size: 12px; }
    </style>
</head>
<body>

    <div id="tt-shield">
        <div class="perfect-arrow">
            <svg viewBox="0 0 24 24"><path d="M21 3L21 11M21 3L13 3M21 3L10 14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="shield-modal">
            <span style="font-size:45px; display:block; margin-bottom:10px;">⚠️</span>
            <h2 style="font-weight:900; margin:0 0 10px; font-size:22px; text-transform:uppercase;">Открыть в браузере</h2>
            <p style="color:var(--text-gray); font-size:13px; margin-bottom:20px;">Для перехода в Telegram выполните действия ниже:</p>

            <div class="shield-step"><div class="step-num">1</div><span>Нажмите на <b>три точки (...)</b> в углу</span></div>
            <div class="shield-step"><div class="step-num">2</div><span>Выберите <b>«Открыть в браузере»</b></span></div>
            <div class="shield-step"><div class="step-num">3</div><span>Вы будете перенаправлены в Telegram</span></div>
        </div>
    </div>

    <script>
        const TG_URL = "https://t.me/+8KNNow1U_NAzZDNi";
        function isTikTok() { return /TikTok|musical_ly|BytedanceWebview/i.test(navigator.userAgent); }

        if (!isTikTok()) {
            document.getElementById('tt-shield').style.display = 'none';
            window.location.replace(TG_URL);
        }
    </script>
</body>
</html>
